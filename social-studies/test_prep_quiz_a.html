<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Lesson 6 - Quiz A</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4a148c 0%, #7b1fa2 50%, #ab47bc 100%);
            min-height: 100vh;
            padding: 15px;
            padding-bottom: 100px;
        }

        .header {
            text-align: center; color: white; margin-bottom: 15px;
            padding: 15px; background: rgba(255,255,255,0.1); border-radius: 15px;
        }
        .header h1 { font-size: 1.4em; margin-bottom: 5px; }
        .header h2 { font-size: 1.1em; font-weight: normal; opacity: 0.9; }
        .header p { font-size: 0.9em; opacity: 0.8; margin-top: 5px; }
        .header .focus-note {
            margin-top: 8px; padding: 6px 14px; background: rgba(255,193,7,0.3);
            border-radius: 10px; font-size: 0.85em; display: inline-block;
        }

        .score-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: white; padding: 12px 20px; border-radius: 15px;
            margin-bottom: 15px; flex-wrap: wrap; gap: 10px;
        }
        .score-item { font-weight: bold; font-size: 0.95em; }
        .score-item.correct { color: #27ae60; }
        .score-item.wrong { color: #e74c3c; }
        .score-item.progress { color: #6a1b9a; }

        .progress-bar { width: 100%; height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden; margin-top: 10px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #7b1fa2, #ce93d8); border-radius: 4px; transition: width 0.3s ease; }

        .mode-selector { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .mode-btn {
            padding: 12px 25px; border: none; border-radius: 25px;
            font-size: 1em; font-weight: bold; cursor: pointer; transition: all 0.3s ease;
        }
        .mode-btn.practice { background: #7b1fa2; color: white; }
        .mode-btn.test { background: #e74c3c; color: white; }
        .mode-btn.active { transform: scale(1.1); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .mode-btn:not(.active) { opacity: 0.6; }

        .question-card {
            background: white; border-radius: 20px; padding: 20px;
            margin-bottom: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .question-card.answered-correct { border: 3px solid #27ae60; background: linear-gradient(to bottom, #d4edda, white); }
        .question-card.answered-wrong { border: 3px solid #e74c3c; background: linear-gradient(to bottom, #f8d7da, white); }

        .question-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .question-number { background: #6a1b9a; color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 0.85em; }
        .question-type { padding: 5px 12px; border-radius: 15px; font-size: 0.75em; font-weight: bold; }
        .question-type.vocab { background: #f3e5f5; color: #7b1fa2; }
        .question-type.evidence { background: #e8eaf6; color: #283593; }
        .question-type.explain { background: #fce4ec; color: #c2185b; }
        .question-type.select-two { background: #fff3e0; color: #ef6c00; }
        .question-type.matching { background: #e0f2f1; color: #00695c; }
        .question-type.linked { background: #ffebee; color: #b71c1c; }

        .passage {
            background: #f5f0ff; border-left: 4px solid #7b1fa2;
            padding: 15px; margin-bottom: 15px; font-style: italic;
            color: #555; border-radius: 0 10px 10px 0; font-size: 0.95em; line-height: 1.5;
        }

        .question-text { font-size: 1.1em; font-weight: bold; color: #333; margin-bottom: 15px; line-height: 1.4; }
        .question-text .highlight { background: #e1bee7; padding: 2px 4px; border-radius: 3px; }

        .select-instruction { color: #ef6c00; font-size: 0.9em; font-weight: bold; margin-bottom: 10px; }

        .options { display: flex; flex-direction: column; gap: 10px; }
        .option {
            padding: 15px; background: #f8f5ff; border: 2px solid #d1c4e9;
            border-radius: 12px; cursor: pointer; transition: all 0.3s ease;
            font-size: 0.95em; line-height: 1.4;
        }
        .option:hover:not(.disabled) { background: #ede7f6; border-color: #7b1fa2; }
        .option.selected { background: #7b1fa2; border-color: #7b1fa2; color: white; }
        .option.correct { background: #27ae60; border-color: #27ae60; color: white; }
        .option.wrong { background: #e74c3c; border-color: #e74c3c; color: white; }
        .option.show-correct { background: #27ae60; border-color: #27ae60; color: white; animation: pulse 0.5s ease; }
        .option.disabled { cursor: not-allowed; }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }

        .result-box { display: none; padding: 15px; border-radius: 12px; margin-top: 15px; font-weight: bold; }
        .result-box.show { display: block; }
        .result-box.correct { background: #d4edda; color: #155724; border: 2px solid #27ae60; }
        .result-box.wrong { background: #f8d7da; color: #721c24; border: 2px solid #e74c3c; }
        .result-box .explanation { font-weight: normal; margin-top: 10px; font-size: 0.9em; line-height: 1.4; }
        .result-box .tip { margin-top: 8px; padding: 8px; background: rgba(0,0,0,0.05); border-radius: 8px; font-size: 0.85em; font-style: italic; }

        .matching-container { margin-top: 10px; }
        .matching-slots { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .matching-slot { display: flex; align-items: center; gap: 10px; padding: 10px; background: #f8f5ff; border: 2px solid #d1c4e9; border-radius: 10px; }
        .slot-number { font-weight: bold; color: #6a1b9a; min-width: 25px; }
        .slot-drop {
            flex: 1; min-height: 40px; border: 2px dashed #b39ddb; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.9em; color: #666; cursor: pointer; padding: 8px; transition: all 0.3s ease;
        }
        .slot-drop.filled { border-style: solid; border-color: #7b1fa2; background: #f3e5f5; color: #333; }
        .slot-drop.correct-slot { border-color: #27ae60; background: #d4edda; }
        .slot-drop.wrong-slot { border-color: #e74c3c; background: #f8d7da; }

        .matching-choices { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .matching-choice {
            padding: 8px 14px; background: #7b1fa2; color: white;
            border-radius: 20px; cursor: pointer; font-size: 0.85em; transition: all 0.3s ease; border: none;
        }
        .matching-choice:hover { transform: scale(1.05); }
        .matching-choice.used { opacity: 0.3; cursor: not-allowed; }
        .matching-choice.selected-choice { outline: 3px solid #ffd54f; }

        .nav-buttons { display: flex; justify-content: center; gap: 15px; margin-top: 15px; }
        .nav-btn {
            padding: 12px 30px; border: none; border-radius: 25px;
            font-size: 1em; font-weight: bold; cursor: pointer; transition: all 0.3s ease;
        }
        .nav-btn.next { background: #7b1fa2; color: white; }
        .nav-btn.submit { background: #27ae60; color: white; }
        .nav-btn:hover { transform: scale(1.05); }
        .nav-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .voice-btn {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 8px 15px; background: #f3e5f5; border: none;
            border-radius: 20px; cursor: pointer; font-size: 0.85em; margin-bottom: 10px;
            color: #6a1b9a;
        }

        .final-results {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 1000;

        .final-results.show { display: flex; }
        .results-content {
            background: white; border-radius: 25px; padding: 30px; text-align: center;
            max-width: 90%; max-height: 90vh; overflow-y: auto; animation: bounceIn 0.5s ease;
        }
        @keyframes bounceIn { 0% { transform: scale(0); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .results-content h2 { font-size: 1.8em; margin-bottom: 15px; color: #6a1b9a; }
        .results-content .grade { font-size: 4em; font-weight: bold; margin: 20px 0; }
        .results-content .grade.A { color: #27ae60; }
        .results-content .grade.B { color: #3498db; }
        .results-content .grade.C { color: #f39c12; }
        .results-content .grade.D { color: #e67e22; }
        .results-content .grade.F { color: #e74c3c; }
        .results-content .score-detail { font-size: 1.3em; margin-bottom: 20px; }
        .results-content .message { font-size: 1.1em; color: #666; margin-bottom: 25px; }
        .results-content .weak-areas { text-align: left; margin: 15px 0; padding: 15px; background: #f3e5f5; border-radius: 10px; }
        .results-content .weak-areas h3 { color: #7b1fa2; margin-bottom: 8px; }
        .results-content .weak-areas li { margin: 5px 0; font-size: 0.95em; }

        .restart-btn {
            padding: 15px 40px; background: #7b1fa2; color: white; border: none;
            border-radius: 30px; font-size: 1.1em; font-weight: bold; cursor: pointer; margin: 5px;
        }
        .restart-btn.review { background: #e74c3c; }

        .emoji-burst {
            position: fixed; font-size: 2em; pointer-events: none;
            animation: float-up 1s ease-out forwards; z-index: 999;
        }
        @keyframes float-up { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-100px) scale(1.5); } }

        @media (max-width: 600px) {
            .header h1 { font-size: 1.2em; }
            .question-text { font-size: 1em; }
            .option { padding: 12px; font-size: 0.9em; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Chapter 1, Lesson 6 - Quiz A</h1>
        <h2>Northwest and Northeast Peoples of California</h2>
        <p>Yurok & Modoc Tribes</p>
        <div class="focus-note">Extra practice on evidence & select-two questions (your growth areas!)</div>
    </div>

    <div class="score-bar">
        <span class="score-item correct">Correct: <span id="correct-count">0</span></span>
        <span class="score-item wrong">Wrong: <span id="wrong-count">0</span></span>
        <span class="score-item progress">Question: <span id="current-q">1</span>/<span id="total-q">15</span></span>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </div>

    <div class="mode-selector">
        <button class="mode-btn practice active" onclick="setMode('practice')">Practice Mode</button>
        <button class="mode-btn test" onclick="setMode('test')">Test Mode</button>
    </div>

    <div id="question-container"></div>

    <div class="nav-buttons">
        <button class="nav-btn next" id="next-btn" onclick="nextQuestion()">Next Question</button>
    </div>

    <div class="final-results" id="final-results">
        <div class="results-content">
            <h2 id="results-title">Quiz A Complete!</h2>
            <div class="grade" id="grade">A</div>
            <div class="score-detail" id="score-detail"></div>
            <div class="message" id="results-message"></div>
            <div class="weak-areas" id="weak-areas" style="display:none;">
                <h3>Areas to Review:</h3>
                <ul id="weak-list"></ul>
            </div>
            <button class="restart-btn" onclick="restart()">Try Again</button>
            <button class="restart-btn review" id="review-btn" onclick="reviewWrong()">Review Mistakes</button>
        </div>
    </div>

    <script>
        const questions = [
            // Q1 - Multiple Choice
            {
                type: "Multiple Choice", typeClass: "explain", category: "comprehension",
                question: "What feature did many villages of the Northwest peoples have in common?",
                options: [
                    "They were along the coast or near rivers.",
                    "They featured unique stone buildings.",
                    "They were near a source of salt water only.",
                    "They grew to fit the size of their population."
                ],
                correct: 0,
                explanation: "Northwest peoples like the Yurok built villages along the coast and near rivers like the Klamath River because these provided important natural resources like salmon and water."
            },
            // Q2 - Linked Evidence to Q1
            {
                type: "Multiple Choice", typeClass: "linked", category: "evidence",
                question: "Which evidence from the text <span class='highlight'>best supports</span> the correct response to question 1?",
                options: [
                    "\"The Northwest peoples include the Tolowa, the Yurok, the Wiyot, and the Whilkut.\"",
                    "\"The Northwest area is bordered by the Pacific Ocean to the west. It has a moist, wet climate. The rivers provided a natural fish highway.\"",
                    "\"About forty to fifty tribes made up the Yokuts group.\"",
                    "\"The people of the north also practiced the annual Sacred Jump Dance.\""
                ],
                correct: 1,
                explanation: "This quote directly shows that the Pacific Ocean and rivers were key features, supporting the answer that villages were near the coast or rivers.",
                tip: "Evidence questions ask you to find the quote that PROVES your answer. Look for specific details!"
            },
            // Q3 - Vocabulary
            {
                type: "Multiple Choice", typeClass: "vocab", category: "vocabulary",
                passage: "\"For thousands of years, the Yurok people lived in harmony with nature along the Klamath River and Pacific Coast, adapting to their forest environment.\"",
                question: "What is the meaning of the word <span class='highlight'>adapting</span> as used in this paragraph?",
                options: [
                    "Adjusting lifestyle to surroundings",
                    "Surviving difficult conditions",
                    "Becoming an expert in something",
                    "Creating a shorter version of something"
                ],
                correct: 0,
                explanation: "Adapting means adjusting your lifestyle to fit your surroundings. The Yurok adapted by using the forest and river resources around them for food, shelter, and tools."
            },
            // Q4 - Select Two (evidence)
            {
                type: "Select Two", typeClass: "select-two", category: "evidence-select",
                question: "Which evidence from the text <span class='highlight'>best supports</span> the idea that tomols — I mean salmon fishing — were helpful tools for the Yurok? <span class='highlight'>Select two choices.</span>",
                options: [
                    "\"Salmon was a major part of their diet.\"",
                    "\"The Yurok lived in houses made of redwood planks.\"",
                    "\"The Yurok smoked the salmon to preserve it so they could eat salmon all year round.\"",
                    "\"The Yurok collected nuts, berries, and acorns from the forest.\""
                ],
                correct: [0, 2],
                selectTwo: true,
                explanation: "Both quotes show salmon's importance: it was a 'major part of their diet' AND they preserved it by smoking so they could eat it 'all year round.' Together these prove salmon fishing was essential.",
                tip: "For Select Two: both answers must SUPPORT the same idea. Read each option and ask 'Does this prove the point?'"
            },
            // Q5 - Multiple Choice
            {
                type: "Multiple Choice", typeClass: "explain", category: "comprehension",
                question: "Which statement <span class='highlight'>best describes</span> the Yurok cultural group?",
                options: [
                    "Yokuts preferred to live in marshy rather than dry areas.",
                    "The Yurok lived along the Klamath River and Pacific Coast, using the forest for food, shelter, and resources while living in harmony with nature.",
                    "The Yurok settled in very large villages in the Central Valley area.",
                    "The Yurok were a diverse group that lived near the Sierra Nevada."
                ],
                correct: 1,
                explanation: "The Yurok are defined by their connection to the Klamath River, Pacific Coast, and forests. They used redwoods for houses, caught salmon, and lived in harmony with nature."
            },
            // Q6 - Linked Evidence to Q5
            {
                type: "Multiple Choice", typeClass: "linked", category: "evidence",
                question: "Which evidence from the text <span class='highlight'>best supports</span> the correct response to question 5?",
                options: [
                    "\"The forest provided so much food that the Yurok never needed to develop farming.\"",
                    "\"The Modoc lived on the plateau.\"",
                    "\"The Sacred Jump Dance was meant to fix the earth.\"",
                    "\"Giant redwoods can live for over 2,000 years.\""
                ],
                correct: 0,
                explanation: "This quote shows the forest was so rich in resources that the Yurok didn't even need farming — proving they truly relied on and lived in harmony with the forest.",
                tip: "Look for quotes that contain SPECIFIC facts that directly prove the answer to the previous question."
            },
            // Q7 - Vocabulary
            {
                type: "Multiple Choice", typeClass: "vocab", category: "vocabulary",
                passage: "\"Early peoples built weirs — fence-like structures stretching across the river — to trap salmon. Men and boys would stand on platforms and use spears to catch the trapped fish.\"",
                question: "What is the meaning of the word <span class='highlight'>weirs</span>?",
                options: [
                    "Fence-like structures built across a river to trap fish",
                    "Large boats used for ocean fishing",
                    "Nets made of woven plant fiber",
                    "Stone walls built to block water flow"
                ],
                correct: 0,
                explanation: "Weirs were fence-like structures that stretched across the river to trap salmon. The text defines it right there — 'fence-like structures stretching across the river.'"
            },
            // Q8 - Multiple Choice
            {
                type: "Multiple Choice", typeClass: "explain", category: "comprehension",
                question: "Which statement <span class='highlight'>best explains</span> why the Yurok never needed to develop farming?",
                options: [
                    "They traded with other tribes for all their food.",
                    "The forest and river provided so much food — nuts, berries, acorns, salmon, and wild plants — that farming was unnecessary.",
                    "The soil near the coast was too sandy to grow crops.",
                    "They only ate fish and nothing else."
                ],
                correct: 1,
                explanation: "The text says 'the forest provided so much food so well that the Yurok never needed to develop farming.' The abundance of natural resources made farming unnecessary."
            },
            // Q9 - Select Two (evidence)
            {
                type: "Select Two", typeClass: "select-two", category: "evidence-select",
                question: "Which <span class='highlight'>TWO</span> pieces of evidence show that the Modoc adapted to life on the plateau by moving with the seasons?",
                options: [
                    "\"In spring they set up temporary camps of wickiups made of willow frames and covered with mats.\"",
                    "\"The Modoc made beautiful baskets of many shapes and sizes.\"",
                    "\"In summer they moved to the mountains to gather berries and to hunt deer and bear.\"",
                    "\"They called their sweat baths spukfish.\""
                ],
                correct: [0, 2],
                selectTwo: true,
                explanation: "Both quotes show the Modoc moving with seasons: temporary wickiup camps in spring, then moving to mountains in summer. Together they prove seasonal adaptation.",
                tip: "Read ALL options before choosing. Both answers should support the SAME idea."
            },
            // Q10 - Multiple Choice
            {
                type: "Multiple Choice", typeClass: "explain", category: "comprehension",
                question: "Which statement <span class='highlight'>best describes</span> Modoc pit houses?",
                options: [
                    "Houses made of redwood planks with round doorways",
                    "Pit houses were partially underground with earth roofs near lakes, protecting from extreme cold in winter",
                    "Dome-shaped houses made of willow and covered with animal skins",
                    "Temporary tents that could be carried from place to place"
                ],
                correct: 1,
                explanation: "Modoc pit houses were partially underground with earth roofs in their permanent villages near lakes. Being underground protected them from the extreme cold of winter on the plateau."
            },
            // Q11 - Linked Evidence to Q10
            {
                type: "Multiple Choice", typeClass: "linked", category: "evidence",
                question: "Which evidence from the text <span class='highlight'>best supports</span> the correct response to question 10?",
                options: [
                    "\"The Modoc made baskets for different purposes.\"",
                    "\"In their permanent villages near lakes, the pit houses protected them from the extreme cold. The houses were partially underground. The roofs were made of earth.\"",
                    "\"The Yurok built houses with redwood planks.\"",
                    "\"The Sacred Jump Dance was an annual ceremony.\""
                ],
                correct: 1,
                explanation: "This quote directly describes pit houses: permanent villages near lakes, partially underground, earth roofs, protection from extreme cold. It proves the answer perfectly.",
                tip: "The best evidence is the quote that gives the MOST specific details matching your answer."
            },
            // Q12 - Vocabulary
            {
                type: "Multiple Choice", typeClass: "vocab", category: "vocabulary",
                passage: "\"In spring, they set up temporary camps of wickiups, which were dome-shaped shelters made of willow frames and covered with mats or brush.\"",
                question: "What is the meaning of the word <span class='highlight'>wickiups</span>?",
                options: [
                    "Permanent stone houses",
                    "Dome-shaped temporary shelters made of willow frames covered with mats",
                    "Underground pit houses with earth roofs",
                    "Large gathering halls for ceremonies"
                ],
                correct: 1,
                explanation: "A wickiup is a dome-shaped temporary shelter made of willow frames covered with mats. The Modoc used them for temporary spring camps before moving to the mountains."
            },
            // Q13 - Matching/Ordering
            {
                type: "Matching", typeClass: "matching", category: "ordering",
                question: "The Modoc moved with the seasons. Put these activities in the <span class='highlight'>correct seasonal order</span>.",
                matchItems: [
                    "Set up temporary wickiup camps",
                    "Move to mountains to gather berries and hunt deer",
                    "Prepare for winter by collecting resources",
                    "Return to permanent village pit houses",
                    "Stay in pit houses through winter cold"
                ],
                correctOrder: [0, 1, 2, 3, 4],
                seasonLabels: ["1. Spring", "2. Summer", "3. Fall", "4. Late Fall", "5. Winter"],
                explanation: "The Modoc seasonal cycle: Spring (wickiup camps) then Summer (mountains for berries/hunting) then Fall (prepare for winter) then Late Fall (return to permanent village) then Winter (pit houses)."
            },
            // Q14 - Select Two
            {
                type: "Select Two", typeClass: "select-two", category: "evidence-select",
                question: "Which <span class='highlight'>TWO</span> statements describe how Northwest and Northeast peoples passed down their beliefs?",
                options: [
                    "They taught children through creation stories — narratives about how the world began and how people came into existence.",
                    "They wrote books and stored them in libraries.",
                    "They practiced the annual Sacred Jump Dance, a ceremony meant to renew the world and 'fix the earth.'",
                    "They drew maps of their territories on animal skins."
                ],
                correct: [0, 2],
                selectTwo: true,
                explanation: "The peoples passed down beliefs through creation stories (myths about how the world began) and ceremonies like the Sacred Jump Dance (to 'fix the earth'). Both are ways of sharing cultural beliefs."
            },
            // Q15 - Multiple Choice
            {
                type: "Multiple Choice", typeClass: "explain", category: "comprehension",
                question: "Which statement <span class='highlight'>best explains</span> why women being shamans in the north was significant?",
                options: [
                    "Women shamans were more powerful than men.",
                    "It was a major difference from other groups — in most other areas, men were usually the shamans.",
                    "Women shamans only treated children.",
                    "All women in the north were required to become shamans."
                ],
                correct: 1,
                explanation: "The text specifically says 'A major difference, however, was that women were often the shamans in the north.' This set the Northwest/Northeast peoples apart from other California Indian groups."
            }
        ];

        let currentQuestion = 0, correctCount = 0, wrongCount = 0;
        let answeredQuestions = new Set(), wrongQuestions = [];
        let currentMode = 'practice', selectedOptions = new Set();
        let shuffledQuestions = [], matchingSelections = [], matchingSelectedChoice = null;
        let categoryWrong = {};

        function shuffleArray(a) {
            const b = [...a];
            for (let i = b.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [b[i], b[j]] = [b[j], b[i]];
            }
            return b;
        }

        // Keep linked questions together and in order
        function smartShuffle(qs) {
            const groups = [];
            let i = 0;
            while (i < qs.length) {
                if (qs[i].typeClass === 'explain' && i + 1 < qs.length && qs[i + 1].typeClass === 'linked') {
                    groups.push([qs[i], qs[i + 1]]);
                    i += 2;
                } else {
                    groups.push([qs[i]]);
                    i++;
                }
            }
            const shuffled = shuffleArray(groups);
            return shuffled.flat();
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.mode-btn.${mode}`).classList.add('active');
            restart();
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text.replace(/<[^>]*>/g, ''));
                u.rate = 0.9;
                window.speechSynthesis.speak(u);
            }
        }

        function createEmojis(emojis, count) {
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const el = document.createElement('div');
                    el.className = 'emoji-burst';
                    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    el.style.left = Math.random() * 80 + 10 + '%';
                    el.style.top = Math.random() * 40 + 30 + '%';
                    document.body.appendChild(el);
                    setTimeout(() => el.remove(), 1000);
                }, i * 80);
            }
        }

        function renderQuestion() {
            const q = shuffledQuestions[currentQuestion];
            const container = document.getElementById('question-container');
            selectedOptions.clear();
            matchingSelections = [];
            matchingSelectedChoice = null;

            if (q.type === "Matching") { renderMatching(q, container); }
            else { renderStandard(q, container); }

            document.getElementById('current-q').textContent = currentQuestion + 1;
            document.getElementById('total-q').textContent = shuffledQuestions.length;
            document.getElementById('progress-fill').style.width = ((currentQuestion) / shuffledQuestions.length * 100) + '%';
            updateNextButton();
        }

        function renderStandard(q, container) {
            let html = `<div class="question-card" id="question-card">
                <div class="question-header">
                    <span class="question-number">Question ${currentQuestion + 1}</span>
                    <span class="question-type ${q.typeClass}">${q.type}</span>
                </div>
                <button class="voice-btn" onclick="speak(document.getElementById('q-text').textContent)">Read Aloud</button>`;
            if (q.passage) html += `<div class="passage">${q.passage}</div>`;
            html += `<div class="question-text" id="q-text">${q.question}</div>`;
            if (q.selectTwo) html += `<div class="select-instruction">Select TWO answers</div>`;
            html += `<div class="options">`;
            q.options.forEach((opt, i) => {
                html += `<div class="option" data-index="${i}" onclick="selectOption(${i})">${opt}</div>`;
            });
            html += `</div><div class="result-box" id="result-box"><span id="result-text"></span><div class="explanation" id="explanation"></div></div></div>`;
            container.innerHTML = html;
        }

        function renderMatching(q, container) {
            matchingSelections = new Array(q.matchItems.length).fill(null);
            let html = `<div class="question-card" id="question-card">
                <div class="question-header">
                    <span class="question-number">Question ${currentQuestion + 1}</span>
                    <span class="question-type ${q.typeClass}">Ordering</span>
                </div>
                <div class="question-text">${q.question}</div>
                <div class="matching-container"><div class="matching-slots">`;
            q.seasonLabels.forEach((label, i) => {
                html += `<div class="matching-slot"><span class="slot-number">${label}</span>
                    <div class="slot-drop" id="slot-${i}" onclick="clickSlot(${i})">Click to place</div></div>`;
            });
            html += `</div><div class="matching-choices" id="matching-choices">`;
            const shuffled = q.matchItems.map((t, i) => ({text: t, idx: i}));
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            shuffled.forEach(item => {
                html += `<button class="matching-choice" data-orig="${item.idx}" onclick="selectMatchChoice(this, ${item.idx})">${item.text}</button>`;
            });
            html += `</div></div>
                <div style="text-align:center;margin-top:15px;">
                    <button class="nav-btn submit" onclick="submitMatching()" id="submit-matching-btn" disabled>Check Answers</button>
                </div>
                <div class="result-box" id="result-box"><span id="result-text"></span><div class="explanation" id="explanation"></div></div></div>`;
            container.innerHTML = html;
        }

        function selectMatchChoice(el, idx) {
            if (answeredQuestions.has(currentQuestion)) return;
            document.querySelectorAll('.matching-choice').forEach(c => c.classList.remove('selected-choice'));
            if (!el.classList.contains('used')) { matchingSelectedChoice = idx; el.classList.add('selected-choice'); }
        }

        function clickSlot(slotIdx) {
            if (answeredQuestions.has(currentQuestion) || matchingSelectedChoice === null) return;
            const q = shuffledQuestions[currentQuestion];
            if (matchingSelections[slotIdx] !== null) {
                document.querySelectorAll('.matching-choice').forEach(c => {
                    if (parseInt(c.dataset.orig) === matchingSelections[slotIdx]) c.classList.remove('used');
                });
            }
            matchingSelections[slotIdx] = matchingSelectedChoice;
            const slot = document.getElementById(`slot-${slotIdx}`);
            slot.textContent = q.matchItems[matchingSelectedChoice];
            slot.classList.add('filled');
            document.querySelectorAll('.matching-choice').forEach(c => {
                if (parseInt(c.dataset.orig) === matchingSelectedChoice) { c.classList.add('used'); c.classList.remove('selected-choice'); }
            });
            matchingSelectedChoice = null;
            document.getElementById('submit-matching-btn').disabled = !matchingSelections.every(s => s !== null);
        }

        function submitMatching() {
            if (answeredQuestions.has(currentQuestion)) return;
            const q = shuffledQuestions[currentQuestion];
            answeredQuestions.add(currentQuestion);
            let allCorrect = true;
            matchingSelections.forEach((sel, i) => {
                const slot = document.getElementById(`slot-${i}`);
                if (sel === q.correctOrder[i]) slot.classList.add('correct-slot');
                else { slot.classList.add('wrong-slot'); allCorrect = false; }
            });
            handleResult(allCorrect, q);
        }

        function selectOption(index) {
            if (answeredQuestions.has(currentQuestion)) return;
            const q = shuffledQuestions[currentQuestion];
            const options = document.querySelectorAll('.option');
            if (q.selectTwo) {
                if (selectedOptions.has(index)) { selectedOptions.delete(index); options[index].classList.remove('selected'); }
                else if (selectedOptions.size < 2) { selectedOptions.add(index); options[index].classList.add('selected'); }
                if (selectedOptions.size === 2) setTimeout(() => submitAnswer(), 300);
            } else {
                options.forEach(o => o.classList.remove('selected'));
                selectedOptions.clear();
                selectedOptions.add(index);
                options[index].classList.add('selected');
                setTimeout(() => submitAnswer(), 300);
            }
        }

        function submitAnswer() {
            if (answeredQuestions.has(currentQuestion)) return;
            const q = shuffledQuestions[currentQuestion];
            const options = document.querySelectorAll('.option');
            answeredQuestions.add(currentQuestion);
            options.forEach(o => o.classList.add('disabled'));
            let isCorrect = false;
            if (q.selectTwo) {
                const sel = Array.from(selectedOptions).sort((a,b) => a-b);
                const cor = [...q.correct].sort((a,b) => a-b);
                isCorrect = sel.length === 2 && sel[0] === cor[0] && sel[1] === cor[1];
                options.forEach((o, i) => {
                    if (q.correct.includes(i)) o.classList.add('show-correct');
                    else if (selectedOptions.has(i)) o.classList.add('wrong');
                });
            } else {
                const sel = Array.from(selectedOptions)[0];
                isCorrect = sel === q.correct;
                if (isCorrect) options[sel].classList.add('correct');
                else { options[sel].classList.add('wrong'); options[q.correct].classList.add('show-correct'); }
            }
            handleResult(isCorrect, q);
        }

        function handleResult(isCorrect, q) {
            const card = document.getElementById('question-card');
            const rb = document.getElementById('result-box');
            const rt = document.getElementById('result-text');
            const ex = document.getElementById('explanation');
            if (isCorrect) {
                correctCount++; card.classList.add('answered-correct'); rb.classList.add('correct');
                rt.textContent = 'Correct!'; createEmojis(['⭐','🌟','✨','🎉'], 4);
                if (currentMode === 'practice') speak("Correct! Great job!");
            } else {
                wrongCount++; wrongQuestions.push(currentQuestion);
                categoryWrong[q.category] = (categoryWrong[q.category] || 0) + 1;
                card.classList.add('answered-wrong'); rb.classList.add('wrong');
                rt.textContent = 'Not quite right';
                if (currentMode === 'practice') speak("Not quite. Let me explain.");
            }
            if (currentMode === 'practice') {
                let expHtml = q.explanation;
                if (q.tip) expHtml += `<div class="tip">Tip: ${q.tip}</div>`;
                ex.innerHTML = expHtml;
                rb.classList.add('show');
            }
            document.getElementById('correct-count').textContent = correctCount;
            document.getElementById('wrong-count').textContent = wrongCount;
            updateNextButton();
        }

        function updateNextButton() {
            const btn = document.getElementById('next-btn');
            if (currentQuestion >= shuffledQuestions.length - 1 && answeredQuestions.has(currentQuestion)) {
                btn.textContent = 'See Results'; btn.onclick = showResults;
            } else { btn.textContent = 'Next Question'; btn.onclick = nextQuestion; }
            btn.disabled = !answeredQuestions.has(currentQuestion);
        }

        function nextQuestion() { if (currentQuestion < shuffledQuestions.length - 1) { currentQuestion++; renderQuestion(); } }

        function showResults() {
            const total = shuffledQuestions.length;
            const pct = Math.round((correctCount / total) * 100);
            let grade, title, message;
            if (pct >= 90) { grade='A'; title='Outstanding!'; message="You're ready for your test!"; }
            else if (pct >= 80) { grade='B'; title='Great Job!'; message="Almost there! Review a few topics."; }
            else if (pct >= 70) { grade='C'; title='Good Effort!'; message="Review the questions you missed and try Quiz B!"; }
            else if (pct >= 60) { grade='D'; title='Keep Studying!'; message="Review flashcards, then try again!"; }
            else { grade='F'; title="Don't Give Up!"; message="Go back to flashcards first, then try again!"; }
            speak(`You got ${pct} percent. ${message}`);
            document.getElementById('results-title').textContent = title;
            document.getElementById('grade').textContent = grade;
            document.getElementById('grade').className = 'grade ' + grade;
            document.getElementById('score-detail').textContent = `${correctCount}/${total} Correct (${pct}%)`;
            document.getElementById('results-message').textContent = message;
            document.getElementById('review-btn').style.display = wrongQuestions.length > 0 ? 'inline-block' : 'none';
            const weakDiv = document.getElementById('weak-areas'), weakList = document.getElementById('weak-list');
            weakList.innerHTML = '';
            const names = { evidence: 'Evidence questions', 'evidence-select': 'Select Two Evidence', vocabulary: 'Vocabulary', comprehension: 'Comprehension', ordering: 'Ordering' };
            let hasWeak = false;
            for (const [c, n] of Object.entries(categoryWrong)) {
                if (n > 0) { hasWeak = true; weakList.innerHTML += `<li>${names[c]||c}: ${n} wrong</li>`; }
            }
            weakDiv.style.display = hasWeak ? 'block' : 'none';
            document.getElementById('final-results').classList.add('show');
            if (pct >= 80) createEmojis(['🏆','⭐','🌟','🎉','👏'], 8);
        }

        function restart() {
            currentQuestion = 0; correctCount = 0; wrongCount = 0;
            answeredQuestions.clear(); wrongQuestions = []; selectedOptions.clear(); categoryWrong = {};
            shuffledQuestions = smartShuffle(questions);
            document.getElementById('correct-count').textContent = 0;
            document.getElementById('wrong-count').textContent = 0;
            document.getElementById('final-results').classList.remove('show');
            renderQuestion();
        }

        function reviewWrong() {
            document.getElementById('final-results').classList.remove('show');
            shuffledQuestions = shuffleArray(wrongQuestions.map(i => shuffledQuestions[i]));
            currentQuestion = 0; correctCount = 0; wrongCount = 0;
            answeredQuestions.clear(); wrongQuestions = []; categoryWrong = {};
            document.getElementById('correct-count').textContent = 0;
            document.getElementById('wrong-count').textContent = 0;
            speak("Let's review the questions you missed!");
            renderQuestion();
        }

        shuffledQuestions = smartShuffle(questions);
        renderQuestion();
    </script>
</body>
</html>
