    <script>
        const questions = [
            // Q1 - Multiple Choice
            {
                type: "Multiple Choice", typeClass: "explain", category: "comprehension",
                question: "Which statement <span class='highlight'>best describes</span> the Northeast culture area of California?",
                options: [
                    "A rainy coastal area with many rivers leading to the ocean.",
                    "A high plateau formed by volcanoes, with parts of the Cascades, fewer major rivers, and many shallow lakes.",
                    "A hot, dry desert region with very little plant life.",
                    "A wide valley in the center of the state with flat grasslands."
                ],
                correct: 1,
                explanation: "The Northeast includes the Modoc Plateau and parts of the Cascades. It was formed by volcanoes and has fewer rivers but many shallow lakes — very different from the wet Northwest."
            },
            // Q2 - Linked Evidence to Q1
            {
                type: "Multiple Choice", typeClass: "linked", category: "evidence",
                question: "Which evidence from the text <span class='highlight'>best supports</span> the correct response to question 1?",
                options: [
                    "\"The Northwest area is bordered by the Pacific Ocean.\"",
                    "\"The Northeast area includes part of the Cascades and the Modoc Plateau. It is an area formed by volcanoes. It has fewer major rivers but many shallow lakes.\"",

                    "\"About 10 mid-size groups grew and did well.\""
                ],
                correct: 1,
                explanation: "This quote directly lists the specific features: Cascades, Modoc Plateau, formed by volcanoes, fewer rivers, shallow lakes — exactly matching the answer.",
                tip: "The best supporting evidence repeats or confirms the KEY details from your answer."
            },
            // Q3 - Multiple Choice
            {
                type: "Multiple Choice", typeClass: "explain", category: "comprehension",
                question: "Which statement <span class='highlight'>best explains</span> how giant redwoods survive the dry summer without much rain?",
                options: [
                    "They store water inside their trunks like a cactus.",
                    "They absorb moisture from the dense fog, and their roots trap moisture in the soil.",
                    "Other trees share water with the redwoods through their roots.",
                    "They go dormant and stop growing during summer."

                correct: 1,
                explanation: "Even though there's not much rain in summer, the redwoods get water by absorbing moisture from the dense fog. Their roots also trap moisture in the soil for other plants to use."
            },
            // Q4 - Vocabulary
            {
                type: "Multiple Choice", typeClass: "vocab", category: "vocabulary",
                passage: "\"The people explained the natural world and learned to value and care for nature through creation stories — a culture's narratives or myths about how the world began and how people came into existence.\"",
                question: "What is the meaning of <span class='highlight'>creation stories</span> as used in this paragraph?",

                    "Written histories kept on scrolls",

            // Q5 - Select Two (evidence)
            {

                question: "Which <span class='highlight'>TWO</span> pieces of evidence show that the Yurok cared about living in harmony with the forest?",
                options: [
                    "\"They used planks from the redwoods to build houses, but they removed only naturally fallen trees, or they removed small amounts of wood from large trees without killing them.\"",

            },
            // Q6 - Multiple Choice
            {
                type: "Multiple Choice", typeClass: "explain", category: "comprehension",
                question: "Which statement <span class='highlight'>best describes</span> what the Modoc sweathouse was used for?",
                options: [
                    "Only for cooking food",
                    "For cleansing before a hunt, socializing, and religious rituals",

                    "Only for children to play in during winter"

            },
            // Q7 - Linked Evidence to Q6
            {
                type: "Multiple Choice", typeClass: "linked", category: "evidence",
                question: "Which evidence from the text <span class='highlight'>best supports</span> the correct response to question 6?",
                options: [
                    "\"The sweathouse was dome-shaped.\"",
                    "\"The men sat in the heat to cleanse themselves before a hunt. They also used the sweathouses for socializing and for some religious rituals.\"",
                    "\"The Modoc moved with the seasons.\"",
                    "\"Modoc women were excellent basket weavers.\""
                ],
                correct: 1,
                explanation: "This quote lists ALL three uses: cleansing before hunts, socializing, and religious rituals — matching the answer that sweathouses had multiple purposes.",
                tip: "When a question asks about multiple uses, find the quote that mentions ALL the uses, not just one."
            },
            // Q8 - Vocabulary
            {
                type: "Multiple Choice", typeClass: "vocab", category: "vocabulary",
                passage: "\"The early peoples used the forests of the Modoc Plateau for fuel, food, and shelter. Big game such as bears, elk, and deer were plentiful for hunting. Early peoples fished in lakes and used lake water for daily activities.\"",
                question: "What is the meaning of <span class='highlight'>plentiful</span> in this paragraph?",
                options: [
                    "Dangerous and hard to catch",
                    "Available in large amounts; abundant",
                    "Rare and hard to find",
                    "Small in size"
                ],
                correct: 1,
                explanation: "Plentiful means available in large amounts or abundant. Big game like bears, elk, and deer were plentiful — meaning there were lots of them available for hunting on the plateau."

            {
                type: "Select Two", typeClass: "select-two", category: "evidence-select",
                question: "Which <span class='highlight'>TWO</span> groups of people lived in the Northwest culture area?",
                options: [
                    "The Yurok",
                    "The Modoc",
                    "The Hupa",
                    "The Achumawi"
                ],
                correct: [0, 2],
                selectTwo: true,
                explanation: "The Yurok and the Hupa are Northwest peoples. The Modoc and Achumawi are Northeast peoples who lived on the plateau. Remember: Northwest = coast/rivers, Northeast = plateau/lakes."

            // Q10 - Multiple Choice

                question: "Which statement <span class='highlight'>best explains</span> why there is a controversy about dams on the Klamath River?",
                options: [

            },
            // Q11 - Linked Evidence to Q10
            {
                type: "Multiple Choice", typeClass: "linked", category: "evidence",
                question: "Which evidence from the text <span class='highlight'>best supports</span> the correct response to question 10?",
                options: [
                    "\"The Klamath River starts at Klamath Lake in Oregon.\"",
                    "\"Some people have arguments about the dams. Some believe they help manage natural resources and generate electricity. Others say the dams reduced the salmon population by blocking upstream travel.\"",
                    "\"Salmon swim upstream in the spring.\"",
                    "\"Early peoples like the Yurok built weirs to trap salmon.\""
                ],
                correct: 1,
                explanation: "This quote presents BOTH sides of the controversy: pro-dam (manage resources, electricity) and anti-dam (reduced salmon). It directly supports the answer about the disagreement.",
                tip: "When questions ask about controversy or debate, look for evidence that shows BOTH sides."
            },
            // Q12 - Vocabulary
            {

                passage: "\"Like other groups, the Northwest and Northeast peoples had shamans, who were people thought to have supernatural powers that could be used for healing.\"",

            {
                type: "Matching", typeClass: "matching", category: "ordering",

                matchItems: [
                    "Lived along Klamath River, used redwood for houses",
                    "Lived on the plateau, used pit houses and wickiups",
                    "Tallest trees in the world, up to 365 feet",
                    "Fence-like structure across river to trap fish",

                correctOrder: [0, 1, 2, 3, 4],

                type: "Multiple Choice", typeClass: "explain", category: "comprehension",
                question: "Which statement <span class='highlight'>best describes</span> what the Modoc stick game was?",

                    "A ceremony led by shamans to predict the weather"

        let currentQuestion = 0, correctCount = 0, wrongCount = 0;
        let answeredQuestions = new Set(), wrongQuestions = [];
        let currentMode = 'practice', selectedOptions = new Set();
        let shuffledQuestions = [], matchingSelections = [], matchingSelectedChoice = null;
        let categoryWrong = {};

        function shuffleArray(a) {
            const b = [...a];
            for (let i = b.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [b[i], b[j]] = [b[j], b[i]];
            }
            return b;
        }

        function smartShuffle(qs) {
            const groups = [];
            let i = 0;
            while (i < qs.length) {
                if (i + 1 < qs.length && qs[i + 1].typeClass === 'linked') {
                    groups.push([qs[i], qs[i + 1]]);
                    i += 2;
                } else {
                    groups.push([qs[i]]);
                    i++;
                }
            }
            return shuffleArray(groups).flat();
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.mode-btn.${mode}`).classList.add('active');
            restart();
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text.replace(/<[^>]*>/g, ''));
                u.rate = 0.9;
                window.speechSynthesis.speak(u);
            }
        }

        function createEmojis(emojis, count) {
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const el = document.createElement('div');
                    el.className = 'emoji-burst';
                    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    el.style.left = Math.random() * 80 + 10 + '%';
                    el.style.top = Math.random() * 40 + 30 + '%';
                    document.body.appendChild(el);
                    setTimeout(() => el.remove(), 1000);
                }, i * 80);
            }
        }

        function renderQuestion() {
            const q = shuffledQuestions[currentQuestion];
            const container = document.getElementById('question-container');
            selectedOptions.clear();
            matchingSelections = [];
            matchingSelectedChoice = null;
            if (q.type === "Matching") renderMatching(q, container);
            else renderStandard(q, container);
            document.getElementById('current-q').textContent = currentQuestion + 1;
            document.getElementById('total-q').textContent = shuffledQuestions.length;
            document.getElementById('progress-fill').style.width = ((currentQuestion) / shuffledQuestions.length * 100) + '%';
            updateNextButton();
        }

        function renderStandard(q, container) {
            let html = `<div class="question-card" id="question-card">
                <div class="question-header">
                    <span class="question-number">Question ${currentQuestion + 1}</span>
                    <span class="question-type ${q.typeClass}">${q.type}</span>
                </div>
                <button class="voice-btn" onclick="speak(document.getElementById('q-text').textContent)">Read Aloud</button>`;
            if (q.passage) html += `<div class="passage">${q.passage}</div>`;
            html += `<div class="question-text" id="q-text">${q.question}</div>`;
            if (q.selectTwo) html += `<div class="select-instruction">Select TWO answers</div>`;
            html += `<div class="options">`;
            q.options.forEach((opt, i) => {
                html += `<div class="option" data-index="${i}" onclick="selectOption(${i})">${opt}</div>`;
            });
            html += `</div><div class="result-box" id="result-box"><span id="result-text"></span><div class="explanation" id="explanation"></div></div></div>`;
            container.innerHTML = html;
        }

        function renderMatching(q, container) {
            matchingSelections = new Array(q.matchItems.length).fill(null);
            let html = `<div class="question-card" id="question-card">
                <div class="question-header">
                    <span class="question-number">Question ${currentQuestion + 1}</span>
                    <span class="question-type ${q.typeClass}">Matching</span>
                </div>
                <div class="question-text">${q.question}</div>
                <div class="matching-container"><div class="matching-slots">`;
            q.seasonLabels.forEach((label, i) => {
                html += `<div class="matching-slot"><span class="slot-number">${label}</span>
                    <div class="slot-drop" id="slot-${i}" onclick="clickSlot(${i})">Click to place</div></div>`;
            });
            html += `</div><div class="matching-choices" id="matching-choices">`;
            const shuffled = q.matchItems.map((t, i) => ({text: t, idx: i}));
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            shuffled.forEach(item => {
                html += `<button class="matching-choice" data-orig="${item.idx}" onclick="selectMatchChoice(this, ${item.idx})">${item.text}</button>`;
            });
            html += `</div></div>
                <div style="text-align:center;margin-top:15px;">
                    <button class="nav-btn submit" onclick="submitMatching()" id="submit-matching-btn" disabled>Check Answers</button>
                </div>
                <div class="result-box" id="result-box"><span id="result-text"></span><div class="explanation" id="explanation"></div></div></div>`;
            container.innerHTML = html;
        }

        function selectMatchChoice(el, idx) {
            if (answeredQuestions.has(currentQuestion)) return;
            document.querySelectorAll('.matching-choice').forEach(c => c.classList.remove('selected-choice'));
            if (!el.classList.contains('used')) { matchingSelectedChoice = idx; el.classList.add('selected-choice'); }
        }

        function clickSlot(slotIdx) {
            if (answeredQuestions.has(currentQuestion) || matchingSelectedChoice === null) return;
            const q = shuffledQuestions[currentQuestion];
            if (matchingSelections[slotIdx] !== null) {
                document.querySelectorAll('.matching-choice').forEach(c => {
                    if (parseInt(c.dataset.orig) === matchingSelections[slotIdx]) c.classList.remove('used');
                });
            }
            matchingSelections[slotIdx] = matchingSelectedChoice;
            const slot = document.getElementById(`slot-${slotIdx}`);
            slot.textContent = q.matchItems[matchingSelectedChoice];
            slot.classList.add('filled');
            document.querySelectorAll('.matching-choice').forEach(c => {
                if (parseInt(c.dataset.orig) === matchingSelectedChoice) { c.classList.add('used'); c.classList.remove('selected-choice'); }
            });
            matchingSelectedChoice = null;
            document.getElementById('submit-matching-btn').disabled = !matchingSelections.every(s => s !== null);
        }

        function submitMatching() {
            if (answeredQuestions.has(currentQuestion)) return;
            const q = shuffledQuestions[currentQuestion];
            answeredQuestions.add(currentQuestion);
            let allCorrect = true;
            matchingSelections.forEach((sel, i) => {
                const slot = document.getElementById(`slot-${i}`);
                if (sel === q.correctOrder[i]) slot.classList.add('correct-slot');
                else { slot.classList.add('wrong-slot'); allCorrect = false; }
            });
            handleResult(allCorrect, q);
        }

        function selectOption(index) {
            if (answeredQuestions.has(currentQuestion)) return;
            const q = shuffledQuestions[currentQuestion];
            const options = document.querySelectorAll('.option');
            if (q.selectTwo) {
                if (selectedOptions.has(index)) { selectedOptions.delete(index); options[index].classList.remove('selected'); }
                else if (selectedOptions.size < 2) { selectedOptions.add(index); options[index].classList.add('selected'); }
                if (selectedOptions.size === 2) setTimeout(() => submitAnswer(), 300);
            } else {
                options.forEach(o => o.classList.remove('selected'));
                selectedOptions.clear();
                selectedOptions.add(index);
                options[index].classList.add('selected');
                setTimeout(() => submitAnswer(), 300);
            }
        }

        function submitAnswer() {
            if (answeredQuestions.has(currentQuestion)) return;
            const q = shuffledQuestions[currentQuestion];
            const options = document.querySelectorAll('.option');
            answeredQuestions.add(currentQuestion);
            options.forEach(o => o.classList.add('disabled'));
            let isCorrect = false;
            if (q.selectTwo) {
                const sel = Array.from(selectedOptions).sort((a,b) => a-b);
                const cor = [...q.correct].sort((a,b) => a-b);
                isCorrect = sel.length === 2 && sel[0] === cor[0] && sel[1] === cor[1];
                options.forEach((o, i) => {
                    if (q.correct.includes(i)) o.classList.add('show-correct');
                    else if (selectedOptions.has(i)) o.classList.add('wrong');
                });
            } else {
                const sel = Array.from(selectedOptions)[0];
                isCorrect = sel === q.correct;
                if (isCorrect) options[sel].classList.add('correct');
                else { options[sel].classList.add('wrong'); options[q.correct].classList.add('show-correct'); }
            }
            handleResult(isCorrect, q);
        }

        function handleResult(isCorrect, q) {
            const card = document.getElementById('question-card');
            const rb = document.getElementById('result-box');
            const rt = document.getElementById('result-text');
            const ex = document.getElementById('explanation');
            if (isCorrect) {
                correctCount++; card.classList.add('answered-correct'); rb.classList.add('correct');
                rt.textContent = 'Correct!'; createEmojis(['⭐','🌟','✨','🎉'], 4);
                if (currentMode === 'practice') speak("Correct! Great job!");
            } else {
                wrongCount++; wrongQuestions.push(currentQuestion);
                categoryWrong[q.category] = (categoryWrong[q.category] || 0) + 1;
                card.classList.add('answered-wrong'); rb.classList.add('wrong');
                rt.textContent = 'Not quite right';
                if (currentMode === 'practice') speak("Not quite. Let me explain.");
            }
            if (currentMode === 'practice') {
                let expHtml = q.explanation;
                if (q.tip) expHtml += `<div class="tip">Tip: ${q.tip}</div>`;
                ex.innerHTML = expHtml;
                rb.classList.add('show');
            }
            document.getElementById('correct-count').textContent = correctCount;
            document.getElementById('wrong-count').textContent = wrongCount;
            updateNextButton();
        }

        function updateNextButton() {
            const btn = document.getElementById('next-btn');
            if (currentQuestion >= shuffledQuestions.length - 1 && answeredQuestions.has(currentQuestion)) {
                btn.textContent = 'See Results'; btn.onclick = showResults;
            } else { btn.textContent = 'Next Question'; btn.onclick = nextQuestion; }
            btn.disabled = !answeredQuestions.has(currentQuestion);
        }

        function nextQuestion() { if (currentQuestion < shuffledQuestions.length - 1) { currentQuestion++; renderQuestion(); } }

        function showResults() {
            const total = shuffledQuestions.length;
            const pct = Math.round((correctCount / total) * 100);
            let grade, title, message;
            if (pct >= 90) { grade='A'; title='Outstanding!'; message="You're ready for your test! Go get that A!"; }
            else if (pct >= 80) { grade='B'; title='Great Job!'; message="Almost there! Review flashcards for the ones you missed."; }
            else if (pct >= 70) { grade='C'; title='Good Effort!'; message="Try Quiz A again or review the flashcards!"; }
            else if (pct >= 60) { grade='D'; title='Keep Studying!'; message="Review flashcards, then try both quizzes again!"; }
            else { grade='F'; title="Don't Give Up!"; message="Start with the flashcards, then try Quiz A first!"; }
            speak(`You got ${pct} percent. ${message}`);
            document.getElementById('results-title').textContent = title;
            document.getElementById('grade').textContent = grade;
            document.getElementById('grade').className = 'grade ' + grade;
            document.getElementById('score-detail').textContent = `${correctCount}/${total} Correct (${pct}%)`;
            document.getElementById('results-message').textContent = message;
            document.getElementById('review-btn').style.display = wrongQuestions.length > 0 ? 'inline-block' : 'none';
            const weakDiv = document.getElementById('weak-areas'), weakList = document.getElementById('weak-list');
            weakList.innerHTML = '';
            const names = { evidence: 'Evidence questions', 'evidence-select': 'Select Two Evidence', vocabulary: 'Vocabulary', comprehension: 'Comprehension', ordering: 'Matching' };
            let hasWeak = false;
            for (const [c, n] of Object.entries(categoryWrong)) {
                if (n > 0) { hasWeak = true; weakList.innerHTML += `<li>${names[c]||c}: ${n} wrong</li>`; }
            }
            weakDiv.style.display = hasWeak ? 'block' : 'none';
            document.getElementById('final-results').classList.add('show');
            if (pct >= 80) createEmojis(['🏆','⭐','🌟','🎉','👏'], 8);
        }

        function restart() {
            currentQuestion = 0; correctCount = 0; wrongCount = 0;
            answeredQuestions.clear(); wrongQuestions = []; selectedOptions.clear(); categoryWrong = {};
            shuffledQuestions = smartShuffle(questions);
            document.getElementById('correct-count').textContent = 0;
            document.getElementById('wrong-count').textContent = 0;
            document.getElementById('final-results').classList.remove('show');
            renderQuestion();
        }

        function reviewWrong() {
            document.getElementById('final-results').classList.remove('show');
            shuffledQuestions = shuffleArray(wrongQuestions.map(i => shuffledQuestions[i]));
            currentQuestion = 0; correctCount = 0; wrongCount = 0;
            answeredQuestions.clear(); wrongQuestions = []; categoryWrong = {};
            document.getElementById('correct-count').textContent = 0;
            document.getElementById('wrong-count').textContent = 0;
            speak("Let's review the questions you missed!");
            renderQuestion();
        }

        shuffledQuestions = smartShuffle(questions);
        renderQuestion();
    </script>
</body>
</html>
